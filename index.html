<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#00a650">
<title>田都こみぐあい</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="田都こみぐあい">
<style>
  :root{
    --green:#00a650; --green-d:#007a3d;
    --bg:#f4f7f5; --card:#ffffff; --line:#e3e8e5;
    --ink:#16241d; --sub:#5d6b64;
    --empty:#2f74e0; --normal:#ef8d2a; --crowd:#d83b30;
    --empty-bg:#e9f1fd; --normal-bg:#fdf1e3; --crowd-bg:#fbeae8;
    --shadow:0 1px 3px rgba(20,40,30,.08),0 1px 2px rgba(20,40,30,.06);
    --hh:96px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{overscroll-behavior:none; background:var(--green)}
  body{overscroll-behavior:none; touch-action:pan-x pan-y;
    margin:0; padding:0;
    font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5; font-size:16px;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    background:var(--green); color:#fff;
    padding:calc(12px + env(safe-area-inset-top)) 16px 0;
    position:sticky; top:0; z-index:30;
  }
  .h-title{font-size:1.12rem; font-weight:800; letter-spacing:.02em}
  .h-title small{font-weight:600; opacity:.85; font-size:.7rem; margin-left:6px}
  .h-now{font-size:.8rem; opacity:.95; margin-top:2px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .rain-badge{background:#fff; color:var(--green-d); font-weight:800; font-size:.68rem; padding:2px 8px; border-radius:999px}
  .tabs{display:flex; gap:8px; margin-top:10px}
  .tabs button{
    flex:1; border:0; background:rgba(255,255,255,.18); color:#fff; opacity:.85;
    padding:10px; border-radius:10px 10px 0 0; font-weight:800; font-size:.92rem; cursor:pointer;
  }
  .tabs button[aria-selected="true"]{background:var(--bg); color:var(--ink); opacity:1}

  main{max-width:560px; margin:0 auto; padding:0 14px 14px}

  .ctrl{
    position:sticky; top:var(--hh); z-index:20; background:var(--bg);
    padding:12px 0 10px; border-bottom:1px solid var(--line); margin-bottom:10px;
  }
  .ctrl .field{margin-bottom:9px}
  .ctrl .field:last-child{margin-bottom:0}
  .lab-s{font-size:.72rem; color:var(--sub); font-weight:700; margin:0 0 5px 2px}

  .seg{display:flex; gap:6px}
  .seg button{
    flex:1; border:1px solid var(--line); background:var(--card); color:var(--sub);
    padding:8px 4px; border-radius:9px; font-weight:700; font-size:.84rem; cursor:pointer;
  }
  .seg button[aria-pressed="true"]{background:var(--green); color:#fff; border-color:var(--green)}
  .seg.dir button[aria-pressed="true"]{background:var(--ink); border-color:var(--ink)}
  .seg .arr{font-weight:800; margin-right:3px}


  select{
    width:100%; font-size:1.02rem; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-family:inherit; font-weight:800;
  }

  .headline{display:flex; align-items:center; justify-content:space-between; gap:8px; margin:2px 2px 0; flex-wrap:wrap}
  .headline .cond{font-size:.95rem; font-weight:800}
  .headline .cond .accent{color:var(--green-d)}
  .legend{display:flex; gap:12px; flex-wrap:wrap}
  .legend span{display:inline-flex; align-items:center; gap:5px; font-size:.74rem; color:var(--sub)}
  .dot{width:11px; height:11px; border-radius:50%; display:inline-block}
  .dot.e{background:var(--empty)} .dot.n{background:var(--normal)} .dot.c{background:var(--crowd)}
  .rain-note{font-size:.72rem; color:var(--crowd); font-weight:700; margin:6px 2px 0}

  .map{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); padding:6px 4px 10px; margin-top:10px}
  .stn{display:flex; align-items:center; gap:12px; padding:0 14px; min-height:44px}
  .rail{position:relative; width:24px; flex:none; align-self:stretch; display:flex; justify-content:center}
  .rail::before{content:""; position:absolute; top:0; bottom:0; width:4px; background:var(--green); border-radius:2px}
  .stn:first-child .rail::before{top:50%}
  .stn:last-child .rail::before{bottom:50%}
  .node{position:relative; z-index:2; width:18px; height:18px; border-radius:50%; border:3px solid #fff; align-self:center; transition:background .2s}
  .node.e{background:var(--empty); box-shadow:0 0 0 1.5px var(--empty)}
  .node.n{background:var(--normal); box-shadow:0 0 0 1.5px var(--normal)}
  .node.c{background:var(--crowd); box-shadow:0 0 0 1.5px var(--crowd)}
  .node.ex{width:22px; height:22px}
  .s-body{flex:1; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0; border-bottom:1px solid var(--line)}
  .stn:last-child .s-body{border-bottom:0}
  .s-name{font-weight:700; font-size:.96rem}
  .s-name .ex-tag{font-size:.6rem; color:var(--green-d); border:1px solid var(--green); border-radius:5px; padding:0 4px; margin-left:6px; vertical-align:1px; font-weight:700}
  .s-lab{font-size:.8rem; font-weight:800; padding:3px 10px; border-radius:999px; white-space:nowrap}
  .s-lab.e{color:var(--empty); background:var(--empty-bg)}
  .s-lab.n{color:var(--normal); background:var(--normal-bg)}
  .s-lab.c{color:var(--crowd); background:var(--crowd-bg)}

  .grid{margin-top:10px}
  .row{display:grid; grid-template-columns:50px 1fr 76px; align-items:center; gap:10px; padding:4px 2px}
  .row .t{font-size:.82rem; color:var(--sub); font-weight:700; font-variant-numeric:tabular-nums; text-align:right}
  .bar{height:20px; border-radius:6px}
  .bar.e{background:var(--empty)} .bar.n{background:var(--normal)} .bar.c{background:var(--crowd)}
  .row.nowrow{background:var(--empty-bg); border-radius:8px}
  .row .rl{font-size:.76rem; font-weight:800; text-align:left}
  .row .rl.e{color:var(--empty)} .row .rl.n{color:var(--normal)} .row .rl.c{color:var(--crowd)}
  .nowtag{font-size:.6rem; background:var(--ink); color:#fff; padding:1px 6px; border-radius:6px; margin-left:5px}

  footer{margin:20px 4px 28px; text-align:center}
  .note{font-size:.73rem; color:var(--sub); line-height:1.7}
  .src{font-size:.73rem; margin-top:10px; line-height:1.9}
  .src a{color:var(--green-d); font-weight:700}
  .row2{display:flex; gap:10px}
  .col2{flex:1; min-width:0}
  .hidden{display:none}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="h-title">田都こみぐあい<small>田園都市線のめやす</small></div>
  <div class="h-now" id="hNow">読み込み中…</div>
  <div class="tabs" id="tabs">
    <button data-tab="now" aria-selected="true">いま・時間帯</button>
    <button data-tab="table" aria-selected="false">駅で見る</button>
  </div>
</header>

<main>
  <!-- いま・時間帯：全駅 × 条件 -->
  <section id="viewNow">
    <div class="ctrl">
      <div class="field row2">
        <div class="col2">
          <div class="lab-s">曜日</div>
          <select id="nowDay"></select>
        </div>
        <div class="col2">
          <div class="lab-s">時間帯</div>
          <select id="nowHour"></select>
        </div>
      </div>
      <div class="field">
        <div class="lab-s">のる向き</div>
        <div class="seg dir" id="nowDir">
          <button data-dir="city" aria-pressed="true"><span class="arr">↑</span>渋谷方面</button>
          <button data-dir="suburb" aria-pressed="false"><span class="arr">↓</span>中央林間方面</button>
        </div>
      </div>
      <div class="headline">
        <div class="cond" id="nowCond"></div>
      </div>
      <div class="legend" style="margin:8px 2px 0">
        <span><i class="dot e"></i>すいてる</span>
        <span><i class="dot n"></i>ふつう</span>
        <span><i class="dot c"></i>混んでる</span>
      </div>
      <div class="rain-note hidden" id="rainNote">☔ 雨のため1段階上げて表示中</div>
    </div>
    <div class="map" id="map"></div>
  </section>

  <!-- 駅で見る：1駅 × 全時間帯 -->
  <section id="viewTable" class="hidden">
    <div class="ctrl">
      <div class="field">
        <div class="lab-s">駅</div>
        <select id="stnSel"></select>
      </div>
      <div class="field">
        <div class="lab-s">曜日</div>
        <div class="seg" id="tblDay">
          <button data-day="weekday" aria-pressed="true">平日</button>
          <button data-day="sat" aria-pressed="false">土曜</button>
          <button data-day="sun" aria-pressed="false">日曜・祝</button>
        </div>
      </div>
      <div class="field">
        <div class="lab-s">のる向き</div>
        <div class="seg dir" id="tblDir">
          <button data-dir="city" aria-pressed="true"><span class="arr">↑</span>渋谷方面</button>
          <button data-dir="suburb" aria-pressed="false"><span class="arr">↓</span>中央林間方面</button>
        </div>
      </div>
      <div class="headline">
        <div class="cond" id="tblCond"></div>
        <div class="legend">
          <span><i class="dot e"></i>すいてる</span>
          <span><i class="dot n"></i>ふつう</span>
          <span><i class="dot c"></i>混んでる</span>
        </div>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <footer>
    <div class="note">
      ※ 国土交通省の混雑率調査や東急電鉄の乗降人員などの公的データをもとにした「めやす」です。<br>
      実測の中継ではなく、遅延・イベント・天候などで実際とずれることがあります。
    </div>
    <div class="src">
      参考データ：
      <a href="https://www.mlit.go.jp/report/press/tetsudo04_hh_000138.html" target="_blank" rel="noopener">国土交通省 都市鉄道の混雑率調査</a> ／
      <a href="https://www.tokyu.co.jp/railway/company/business/passengers/" target="_blank" rel="noopener">東急電鉄 駅別乗降人員</a>
    </div>
  </footer>
</main>

<script>
var STATIONS=[
  {n:"渋谷",ex:true,com:true},{n:"池尻大橋",ex:false,com:false},{n:"三軒茶屋",ex:true,com:true},
  {n:"駒沢大学",ex:false,com:false},{n:"桜新町",ex:false,com:false},{n:"用賀",ex:false,com:false},
  {n:"二子玉川",ex:true,com:true},{n:"二子新地",ex:false,com:false},{n:"高津",ex:false,com:false},
  {n:"溝の口",ex:true,com:true},{n:"梶が谷",ex:false,com:false},{n:"宮崎台",ex:false,com:false},
  {n:"宮前平",ex:false,com:false},{n:"鷺沼",ex:true,com:false},{n:"たまプラーザ",ex:true,com:true},
  {n:"あざみ野",ex:true,com:false},{n:"江田",ex:false,com:false},{n:"市が尾",ex:false,com:false},
  {n:"藤が丘",ex:false,com:false},{n:"青葉台",ex:true,com:true},{n:"田奈",ex:false,com:false},
  {n:"長津田",ex:true,com:false},{n:"つくし野",ex:false,com:false},{n:"すずかけ台",ex:false,com:false},
  {n:"南町田グランベリーパーク",ex:true,com:true},{n:"つきみ野",ex:false,com:false},{n:"中央林間",ex:true,com:false}
];
var LAST=STATIONS.length-1;
var WEEKDAY={5:.15,6:.45,7:.90,8:1.0,9:.72,10:.48,11:.34,12:.40,13:.34,14:.32,15:.40,16:.50,17:.68,18:.92,19:.82,20:.58,21:.48,22:.38,23:.28,24:.18};
var WEEKEND={5:.08,6:.12,7:.18,8:.28,9:.42,10:.56,11:.62,12:.64,13:.62,14:.60,15:.60,16:.58,17:.56,18:.52,19:.46,20:.38,21:.30,22:.24,23:.18,24:.10};

function dirFactor(dt,hour,dir){
  if(dt==="weekday"){
    if(hour>=6&&hour<=9)  return dir==="city"?1.18:0.50;
    if(hour>=17&&hour<=20) return dir==="suburb"?1.18:0.55;
    return 0.85;
  }
  return 0.95;
}
function calcLevel(idx,dir,dt,hour,rainy){
  var st=STATIONS[idx];
  var curve=(dt==="weekday")?WEEKDAY:WEEKEND;
  var base=curve[hour]||0.1;
  if(dt==="sat") base*=1.05;
  var df=dirFactor(dt,hour,dir);
  var pos=0.45+0.55*(1-idx/LAST);
  var s=base*df*pos;
  if(st.ex) s+=0.06;
  if(dt!=="weekday"&&st.com) s+=0.14*base;
  if(rainy) s+=0.12;
  if(s<0.40) return 0;
  if(s<0.70) return 1;
  return 2;
}
var LV=["e","n","c"], LV_TXT=["すいてる","ふつう","混んでる"];
var WDAY=["日","月","火","水","木","金","土"];

var state={ tab:"now", dir:"city",
  now:{day:"auto", hour:"auto"},
  tbl:{stn:11, day:"weekday", dir:"city"},
  rainy:false, wxText:"" };

function dayTypeNow(d){var k=d.getDay();return k===0?"sun":(k===6?"sat":"weekday");}
function curHour(){var h=new Date().getHours();return h<5?24:h;}
function dayLabel(v,d){
  if(v==="auto") return "今日（"+WDAY[d.getDay()]+"）";
  return v==="weekday"?"平日":(v==="sat"?"土曜":"日曜・祝");
}
function hourLabel(v){
  if(v==="auto") return "今 "+curHour()+"時台";
  return (v===24?24:v)+"時台";
}
function dirLabel(v){return v==="city"?"渋谷方面":"中央林間方面";}

/* いま・時間帯 */
function renderNow(){
  var now=new Date();
  var daySel=state.now.day, hourSel=state.now.hour;
  var dt = daySel==="auto" ? dayTypeNow(now) : daySel;
  var isLive = (daySel==="auto" && hourSel==="auto");
  var hour = hourSel==="auto" ? curHour() : hourSel;
  var rainy = isLive ? state.rainy : false;

  document.getElementById("nowCond").innerHTML =
    '<span class="accent">'+dayLabel(daySel,now)+"・"+hourLabel(hourSel)+"</span> ／ "+dirLabel(state.dir)+"のめやす";
  document.getElementById("rainNote").classList.toggle("hidden", !rainy);

  var map=document.getElementById("map"); map.innerHTML="";
  STATIONS.forEach(function(st,i){
    var lv=calcLevel(i,state.dir,dt,hour,rainy);
    var row=document.createElement("div"); row.className="stn";
    row.innerHTML=
      '<div class="rail"><div class="node '+LV[lv]+(st.ex?' ex':'')+'"></div></div>'+
      '<div class="s-body"><div class="s-name">'+st.n+(st.ex?'<span class="ex-tag">急行</span>':'')+'</div>'+
      '<div class="s-lab '+LV[lv]+'">'+LV_TXT[lv]+'</div></div>';
    map.appendChild(row);
  });
}

/* 駅で見る */
function renderTable(){
  var now=new Date();
  var st=STATIONS[state.tbl.stn];
  document.getElementById("tblCond").innerHTML=
    '<span class="accent">'+st.n+"</span> ／ "+
    (state.tbl.day==="weekday"?"平日":(state.tbl.day==="sat"?"土曜":"日曜・祝"))+"・"+dirLabel(state.tbl.dir);

  var isToday=(dayTypeNow(now)===state.tbl.day);
  var nowHour=curHour();
  var grid=document.getElementById("grid"); grid.innerHTML="";
  var hours=[]; for(var h=5;h<=23;h++) hours.push(h); hours.push(24);
  hours.forEach(function(h){
    var lv=calcLevel(state.tbl.stn,state.tbl.dir,state.tbl.day,h,false);
    var isNow=isToday&&(h===nowHour);
    var row=document.createElement("div"); row.className="row"+(isNow?" nowrow":"");
    row.innerHTML=
      '<div class="t">'+(h===24?24:h)+'時</div>'+
      '<div class="bar '+LV[lv]+'"></div>'+
      '<div class="rl '+LV[lv]+'">'+LV_TXT[lv]+(isNow?'<span class="nowtag">今</span>':'')+'</div>';
    grid.appendChild(row);
  });
}

function render(){
  document.getElementById("viewNow").classList.toggle("hidden", state.tab!=="now");
  document.getElementById("viewTable").classList.toggle("hidden", state.tab!=="table");
  if(state.tab==="now") renderNow(); else renderTable();
  setHH();
}

function fmtNow(d){
  var h=d.getHours(),m=d.getMinutes();
  return (d.getMonth()+1)+"/"+d.getDate()+"（"+WDAY[d.getDay()]+"）"+h+":"+(m<10?"0":"")+m;
}
function updateHeader(){
  var wx=state.wxText?" ・ "+state.wxText:"";
  var rain=(state.rainy?'<span class="rain-badge">雨</span>':'');
  document.getElementById("hNow").innerHTML=fmtNow(new Date())+wx+" "+rain;
}
function setHH(){
  var h=document.querySelector("header").offsetHeight;
  document.documentElement.style.setProperty("--hh", h+"px");
}

function loadWeather(){
  var url="https://api.open-meteo.com/v1/forecast?latitude=35.5667&longitude=139.5667&current=precipitation,weather_code&timezone=Asia%2FTokyo";
  fetch(url).then(function(r){return r.json();}).then(function(d){
    var c=d.current||{}, code=c.weather_code, prec=c.precipitation;
    var rainCodes=[51,53,55,56,57,61,63,65,66,67,80,81,82,95,96,99];
    var rainy=(prec&&prec>0)||rainCodes.indexOf(code)!==-1;
    state.rainy=!!rainy; state.wxText=rainy?"☔ 雨":"☀ 晴れ／くもり";
    updateHeader(); if(state.tab==="now") renderNow(); setHH();
  }).catch(function(){ state.wxText="天気は取得できず"; updateHeader(); setHH(); });
}

function segHandler(container, onPick){
  container.addEventListener("click", function(e){
    var b=e.target.closest("button"); if(!b) return;
    [].forEach.call(this.querySelectorAll("button"), function(x){
      x.setAttribute("aria-pressed", x===b?"true":"false");
    });
    onPick(b);
  });
}

function init(){
  // いま画面：曜日プルダウン
  var nowDaySel=document.getElementById("nowDay");
  [{v:"auto",t:"今日"},{v:"weekday",t:"平日"},{v:"sat",t:"土曜"},{v:"sun",t:"日曜・祝"}].forEach(function(o){
    var opt=document.createElement("option"); opt.value=o.v; opt.textContent=o.t;
    if(o.v==="auto") opt.selected=true; nowDaySel.appendChild(opt);
  });
  nowDaySel.addEventListener("change", function(){ state.now.day=this.value; renderNow(); });

  // いま画面：時間帯プルダウン
  var nowHourSel=document.getElementById("nowHour");
  var hourOpts=[{v:"auto",t:"今"}]; for(var h=5;h<=24;h++) hourOpts.push({v:h,t:(h===24?24:h)+"時"});
  hourOpts.forEach(function(o){
    var opt=document.createElement("option"); opt.value=o.v; opt.textContent=o.t;
    if(o.v==="auto") opt.selected=true; nowHourSel.appendChild(opt);
  });
  nowHourSel.addEventListener("change", function(){ state.now.hour=(this.value==="auto")?"auto":parseInt(this.value,10); renderNow(); });

  // 駅セレクト
  var sel=document.getElementById("stnSel");
  STATIONS.forEach(function(st,i){
    var o=document.createElement("option"); o.value=i; o.textContent=st.n;
    if(i===state.tbl.stn) o.selected=true; sel.appendChild(o);
  });
  sel.addEventListener("change", function(){ state.tbl.stn=parseInt(this.value,10); renderTable(); });

  // 方向（いま）
  segHandler(document.getElementById("nowDir"), function(b){ state.dir=b.dataset.dir; renderNow(); });
  // 曜日・方向（駅で見る）
  segHandler(document.getElementById("tblDay"), function(b){ state.tbl.day=b.dataset.day; renderTable(); });
  segHandler(document.getElementById("tblDir"), function(b){ state.tbl.dir=b.dataset.dir; renderTable(); });

  // タブ
  document.getElementById("tabs").addEventListener("click", function(e){
    var b=e.target.closest("button"); if(!b) return;
    state.tab=b.dataset.tab;
    [].forEach.call(this.querySelectorAll("button"), function(x){
      x.setAttribute("aria-selected", x===b?"true":"false");
    });
    render(); window.scrollTo(0,0);
  });

  updateHeader(); render(); loadWeather();
  setInterval(function(){ updateHeader(); }, 60000);
  window.addEventListener("resize", setHH);
  window.addEventListener("load", setHH);
}
document.addEventListener("DOMContentLoaded", init);

if("serviceWorker" in navigator){
  window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
}
</script>
</body>
</html>
